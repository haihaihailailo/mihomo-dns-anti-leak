name: Patch DNS config

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch file
        shell: python
        run: |
          from pathlib import Path
          p = Path('防DNS泄露.yaml')
          s = p.read_text(encoding='utf-8')
          def after(marker, block):
              global s
              if block.strip() not in s:
                  s = s.replace(marker, marker + '\n' + block, 1)
          after('    - "+.msftncsi.com"', '''    - "+.windowsupdate.com"
    - "+.update.microsoft.com"
    - "+.delivery.mp.microsoft.com"
    - "+.dl.delivery.mp.microsoft.com"
    - "+.prod.do.dsp.mp.microsoft.com"
    - "+.trafficshaping.dsp.mp.microsoft.com"
    - "download.windowsupdate.com"
    - "tsfe.trafficshaping.dsp.mp.microsoft.com"''')
          s = s.replace('    proxies: [新加坡节点, 日本节点, 香港节点, 美国节点, 新加坡-自动, 日本-自动, 香港-自动, 美国-自动, 节点选择]\n    url: "https://chatgpt.com/cdn-cgi/trace"', '    proxies: [美国节点, 日本节点, 新加坡节点, 香港节点, 美国-自动, 日本-自动, 新加坡-自动, 香港-自动, 节点选择]\n    url: "https://chatgpt.com/cdn-cgi/trace"')
          after('  - "AND,((NETWORK,UDP),(DST-PORT,443)),REJECT"', '''  - "DOMAIN-SUFFIX,windowsupdate.com,DIRECT"
  - "DOMAIN-SUFFIX,update.microsoft.com,DIRECT"
  - "DOMAIN-SUFFIX,delivery.mp.microsoft.com,DIRECT"
  - "DOMAIN-SUFFIX,dl.delivery.mp.microsoft.com,DIRECT"
  - "DOMAIN-SUFFIX,prod.do.dsp.mp.microsoft.com,DIRECT"
  - "DOMAIN-SUFFIX,trafficshaping.dsp.mp.microsoft.com,DIRECT"
  - "DOMAIN,download.windowsupdate.com,DIRECT"
  - "DOMAIN,tsfe.trafficshaping.dsp.mp.microsoft.com,DIRECT"''')
          after('  - "DOMAIN-SUFFIX,chatgpt.com,AI"', '''  - "DOMAIN,ws.chatgpt.com,AI"
  - "DOMAIN-SUFFIX,auth.openai.com,AI"
  - "DOMAIN,events.statsigapi.net,AI"
  - "DOMAIN-SUFFIX,statsig.com,AI"
  - "DOMAIN-SUFFIX,featuregates.org,AI"
  - "DOMAIN-SUFFIX,featureassets.org,AI"
  - "DOMAIN-SUFFIX,workos.com,AI"
  - "DOMAIN-SUFFIX,workoscdn.com,AI"
  - "DOMAIN-SUFFIX,stripe.com,AI"
  - "DOMAIN-SUFFIX,sentry.io,AI"
  - "DOMAIN,cdn.openaimerge.com,AI"''')
          p.write_text(s, encoding='utf-8')
      - name: Commit
        run: |
          ruby -e 'require "yaml"; YAML.safe_load_file("防DNS泄露.yaml", aliases: true)'
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "防DNS泄露.yaml"
          git diff --cached --quiet || git commit -m "Patch DNS config for Microsoft Store and AI routing"
          git push
