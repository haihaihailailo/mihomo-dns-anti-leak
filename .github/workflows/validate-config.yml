name: Validate Clash config

on:
  push:
    paths:
      - "йҳІDNSжі„йңІ.yaml"
      - "android-process-name-rules.yaml"
      - ".github/workflows/validate-config.yml"
  pull_request:
    paths:
      - "йҳІDNSжі„йңІ.yaml"
      - "android-process-name-rules.yaml"
      - ".github/workflows/validate-config.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-yaml:
    name: Parse DNS config
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Parse YAML with aliases enabled
        run: |
          ruby -e 'require "yaml"; ["йҳІDNSжі„йңІ.yaml", "android-process-name-rules.yaml"].each { |file| YAML.safe_load_file(file, aliases: true); puts "#{file} YAML OK" }'

  validate-mihomo:
    name: Load config with mihomo
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download mihomo
        run: |
          set -euo pipefail
          release_json="$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)"
          url="$(echo "$release_json" | jq -r '.assets[] | select(.name | test("^mihomo-linux-amd64-v1-v.*\\.gz$")) | .browser_download_url' | head -n 1)"
          if [ -z "$url" ]; then
            echo "No linux amd64 v1 mihomo asset found" >&2
            exit 1
          fi
          curl -fsSL "$url" -o mihomo.gz
          gzip -d mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Test config load
        run: |
          ./mihomo -t -f "йҳІDNSжі„йңІ.yaml"
