name: One-shot sync English config

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Sync English config copy
        shell: bash
        run: |
          cp '防DNS泄露.yaml' 'mihomo-dns-anti-leak.yaml'

      - name: Commit sync
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mihomo-dns-anti-leak.yaml
          git commit -m "chore: sync English config copy"
          git push
