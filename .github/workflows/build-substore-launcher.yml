name: Build Sub-Store Launcher EXE

on:
  push:
    paths:
      - "tools/sub-store-windows-exe/**"
      - ".github/workflows/build-substore-launcher.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Publish single-file EXE
        shell: pwsh
        run: |
          dotnet publish tools/sub-store-windows-exe/SubStoreLauncher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o dist

      - name: Rename artifact file
        shell: pwsh
        run: |
          if (Test-Path dist/SubStoreLauncher.exe) {
            Rename-Item dist/SubStoreLauncher.exe SubStoreLauncher-win-x64.exe -Force
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubStoreLauncher-win-x64
          path: dist/SubStoreLauncher-win-x64.exe
          if-no-files-found: error
