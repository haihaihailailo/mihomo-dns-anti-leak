name: Try Stash takeover once

on:
  push:
    paths:
      - ".github/workflows/try-stash-takeover-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  try-stash-takeover:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Convert Stash override to takeover attempt
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path("stash.stoverride")
          text = path.read_text(encoding="utf-8")

          text = text.replace("# Stash 兼容版：自建策略组统一使用 Stash- 前缀，避免和订阅原有组名冲突。", "# Stash 接管版测试：恢复原策略组名，并尝试用 override: true 替换原订阅同名策略组。")
          text = text.replace("Stash-", "")

          lines = text.splitlines()
          out = []
          in_proxy_groups = False
          for line in lines:
              if line.startswith("proxy-groups:"):
                  in_proxy_groups = True
                  out.append(line)
                  continue
              if in_proxy_groups and line and not line.startswith(" ") and not line.startswith("-"):
                  in_proxy_groups = False
              out.append(line)
              if in_proxy_groups and line.startswith("  - name: "):
                  out.append("    override: true")

          text = "\n".join(out) + "\n"
          path.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/try-stash-takeover-once.yml")
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stash.stoverride .github/workflows/try-stash-takeover-once.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "test: try Stash proxy group takeover"
            git push
          fi
