name: One-shot fix DNS config

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch config
        shell: python
        run: |
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')
          original = text

          # 1) Fix TikTok rule-provider path typo.
          text = text.replace('path: "./rulesset/metacubex/tiktok.yaml"', 'path: "./ruleset/metacubex/tiktok.yaml"')

          # 2) Ensure Google account login package rule exists in the main Google process-name block.
          marker = '  - PROCESS-NAME,com.google.android.gsf,谷歌服务 # Google 服务框架\n'
          insert = '  - PROCESS-NAME,com.google.android.gsf.login,谷歌服务 # Google 账号登录\n'
          if insert not in text:
              if marker not in text:
                  raise SystemExit('Google Services Framework marker not found')
              text = text.replace(marker, marker + insert, 1)

          # 3) Remove duplicated quoted Google PROCESS-NAME rules from the later domain-rules section.
          duplicated_lines = [
              '  - "PROCESS-NAME,com.android.vending,谷歌服务"\n',
              '  - "PROCESS-NAME,com.google.android.gms,谷歌服务"\n',
              '  - "PROCESS-NAME,com.google.android.gsf,谷歌服务"\n',
              '  - "PROCESS-NAME,com.google.android.googlequicksearchbox,谷歌服务"\n',
              '  - "PROCESS-NAME,com.google.android.gsf.login,谷歌服务"\n',
          ]
          for line in duplicated_lines:
              text = text.replace(line, '')

          if text == original:
              print('No config changes needed.')
          else:
              path.write_text(text, encoding='utf-8')
              print('Patched 防DNS泄露.yaml')

          # 4) Remove this one-shot workflow after patching.
          workflow = Path('.github/workflows/one-shot-fix-dns-config.yml')
          if workflow.exists():
              workflow.unlink()

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 防DNS泄露.yaml .github/workflows/one-shot-fix-dns-config.yml
          git commit -m "fix: patch Android package rules and TikTok path"
          git push
