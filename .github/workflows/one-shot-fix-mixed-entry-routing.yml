name: One-shot fix mixed entry routing

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch mixed-entry Android routing rules
        shell: python
        run: |
          from pathlib import Path

          files = [Path('防DNS泄露.yaml'), Path('android-process-name-rules.yaml')]
          replacements = {
              '  - PROCESS-NAME,com.tencent.mm,国内服务 # 微信\n':
              '  # - PROCESS-NAME,com.tencent.mm,国内服务 # 微信（由 Clash Mi 分应用黑名单绕过 VPN）\n',
              '  - PROCESS-NAME,com.eg.android.AlipayGphone,国内服务 # 支付宝\n':
              '  # - PROCESS-NAME,com.eg.android.AlipayGphone,国内服务 # 支付宝（由 Clash Mi 分应用黑名单绕过 VPN）\n',
              '  - PROCESS-NAME,com.google.android.webview,谷歌服务 # Android System WebView\n':
              '  # - PROCESS-NAME,com.google.android.webview,谷歌服务 # Android System WebView（混合入口，交给域名规则分流）\n',
              '  - PROCESS-NAME,com.android.chrome,谷歌服务 # Google Chrome\n':
              '  # - PROCESS-NAME,com.android.chrome,谷歌服务 # Google Chrome（浏览器不按包名固定，交给域名规则分流）\n',
              '  - PROCESS-NAME,com.yjllq.chrome.beta,节点选择 # 雨见 cBeta\n':
              '  # - PROCESS-NAME,com.yjllq.chrome.beta,节点选择 # 雨见 cBeta（浏览器不按包名固定，交给域名规则分流）\n',
              '  - PROCESS-NAME,com.heytap.browser,国内服务 # 浏览器\n':
              '  - PROCESS-NAME,com.heytap.browser,国内服务 # OPPO 浏览器\n',
          }

          changed = False
          for path in files:
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in replacements.items():
                  text = text.replace(old, new)
              if 'PROCESS-NAME,com.heytap.browser,国内服务' not in text:
                  raise SystemExit(f'OPPO browser domestic rule missing in {path}')
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  print(f'Patched {path}')
                  changed = True
              else:
                  print(f'No changes needed for {path}')

          if not changed:
              print('No changes needed.')

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 防DNS泄露.yaml android-process-name-rules.yaml
          git commit -m "fix: let mixed-entry apps use domain routing"
          git push
