name: One-shot rename repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Try repository rename
        id: rename
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_NAME: mihomo-dns-anti-leak
        run: |
          set +e
          output="$(gh api -X PATCH "repos/${GITHUB_REPOSITORY}" -f name="${TARGET_NAME}" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "Repository rename requested."
          else
            echo "Repository rename failed; cleaning up workflow before failing."
          fi

      - name: Remove one-shot workflow
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-shot-rename-repo.yml
          git commit -m "chore: remove one-shot repository rename workflow"
          git push

      - name: Fail if rename did not succeed
        if: steps.rename.outputs.status != '0'
        run: exit 1
