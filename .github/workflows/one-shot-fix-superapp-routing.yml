name: One-shot fix super app routing

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Comment WeChat and Alipay PROCESS-NAME rules only
        shell: python
        run: |
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')
          original = text

          replacements = {
              '  - PROCESS-NAME,com.tencent.mm,国内服务 # 微信\n':
              '  # - PROCESS-NAME,com.tencent.mm,国内服务 # 微信：由 Clash Mi 分应用黑名单绕过 VPN\n',
              '  - PROCESS-NAME,com.eg.android.AlipayGphone,国内服务 # 支付宝\n':
              '  # - PROCESS-NAME,com.eg.android.AlipayGphone,国内服务 # 支付宝：由 Clash Mi 分应用黑名单绕过 VPN\n',
          }

          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)

          if text == original:
              print('No changes needed.')
          else:
              path.write_text(text, encoding='utf-8')
              print('Commented WeChat and Alipay package rules. OPPO browser remains 国内服务.')

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 防DNS泄露.yaml
          git commit -m "fix: route WeChat and Alipay via VPN blacklist"
          git push
