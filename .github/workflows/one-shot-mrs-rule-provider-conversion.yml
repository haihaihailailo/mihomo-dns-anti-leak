name: One-shot MRS rule-provider conversion

# Trigger one-shot conversion.
on:
  push:
    paths:
      - ".github/workflows/one-shot-mrs-rule-provider-conversion.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    name: Convert rule providers to MRS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Convert YAML and JS rule-providers
        run: |
          python3 <<'PY'
          from pathlib import Path

          yaml_path = Path("防DNS泄露.yaml")
          js_path = Path("防DNS泄露.js")

          yaml = yaml_path.read_text(encoding="utf-8")
          start = yaml.index("rule-providers:\n")
          end = yaml.index("\n\n# --- 10.", start)
          block = yaml[start:end]
          if block.count("format: yaml") != 2:
              raise SystemExit("unexpected yaml format count")
          if block.count('.yaml"') != 32:
              raise SystemExit("unexpected yaml suffix count")
          block = block.replace("format: yaml", "format: mrs")
          block = block.replace('.yaml"', '.mrs"')
          yaml_path.write_text(yaml[:start] + block + yaml[end:], encoding="utf-8")

          js = js_path.read_text(encoding="utf-8")
          if js.count('format: "yaml"') != 2:
              raise SystemExit("unexpected js format count")
          js = js.replace('format: "yaml"', 'format: "mrs"')
          start = js.index('OVERRIDE["rule-providers"] = {')
          end = js.index("\n};", start)
          block = js[start:end]
          if block.count('.yaml"') != 32:
              raise SystemExit("unexpected js suffix count")
          block = block.replace('.yaml"', '.mrs"')
          js_path.write_text(js[:start] + block + js[end:], encoding="utf-8")
          PY

      - name: Check syntax
        run: |
          ruby -e 'require "yaml"; YAML.safe_load_file("防DNS泄露.yaml", aliases: true)'
          node --check "防DNS泄露.js"

      - name: Commit MRS conversion
        run: |
          set -euo pipefail
          if git diff --quiet -- "防DNS泄露.yaml" "防DNS泄露.js"; then
            echo "No MRS conversion changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "防DNS泄露.yaml" "防DNS泄露.js"
          git commit -m "config: convert rule providers to mrs"
          git push
