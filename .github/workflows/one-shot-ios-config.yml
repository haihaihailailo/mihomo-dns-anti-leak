name: One-shot iOS config generator

# Trigger one-shot iOS config generation with untracked-file detection.
on:
  push:
    paths:
      - ".github/workflows/one-shot-ios-config.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate iOS specific config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate iOS YAML and JS configs
        run: |
          python3 <<'PY'
          from pathlib import Path

          src_yaml = Path("防DNS泄露.yaml")
          src_js = Path("防DNS泄露.js")
          out_yaml = Path("防DNS泄露-iOS.yaml")
          out_js = Path("防DNS泄露-iOS.js")

          yaml = src_yaml.read_text(encoding="utf-8")
          yaml = yaml.replace(
              "# Mihomo / Clash Meta DNS 防泄露与分流主配置\n",
              "# Mihomo / Clash Meta DNS 防泄露与分流 iOS 专用配置\n",
              1,
          )
          yaml = yaml.replace(
              "# 说明：本文件通过 fake-ip、TUN DNS 劫持、规则分流和分应用绕过，降低 DNS 泄露与国内应用异常概率。\n",
              "# 说明：本文件适配 iOS Clash Mi，移除配置内 tun，由客户端接管 VPN 隧道。\n",
              1,
          )
          start = yaml.index("# --- 6. TUN 配置 ---\n")
          end = yaml.index("# --- 7. DNS 防泄露配置 ---", start)
          yaml = yaml[:start] + yaml[end:]
          dns_start = yaml.index("dns:\n")
          yaml = yaml.replace("  ipv6: true\n", "  ipv6: false\n", 1)
          yaml = yaml.replace("  fake-ip-range6: fdfe:dcba:9876::1/64\n", "", 1)
          fb_start = yaml.index("  fallback:\n", dns_start)
          fb_end = yaml.index("  proxy-server-nameserver:\n", fb_start)
          yaml = yaml[:fb_start] + yaml[fb_end:]
          if "\ntun:\n" in yaml or "  fake-ip-range6:" in yaml or "  fallback:" in yaml or "  fallback-filter:" in yaml:
              raise SystemExit("YAML iOS cleanup incomplete")
          if "  ipv6: false\n" not in yaml:
              raise SystemExit("YAML ipv6 was not disabled")
          out_yaml.write_text(yaml, encoding="utf-8")

          js = src_js.read_text(encoding="utf-8")
          js = js.replace(
              " * 文件说明：Clash Party / Mihomo Party JavaScript 覆写版本。\n",
              " * 文件说明：iOS Clash Mi 专用 JavaScript 覆写版本。\n",
              1,
          )
          js = js.replace(
              " * 防DNS泄露.js\n",
              " * 防DNS泄露-iOS.js\n",
              1,
          )
          start = js.index("  tun: {\n")
          end = js.index("  dns: {\n", start)
          js = js[:start] + js[end:]
          js = js.replace("    ipv6: true,\n", "    ipv6: false,\n", 1)
          js = js.replace('    "fake-ip-range6": "fdfe:dcba:9876::1/64",\n', "", 1)
          fb_start = js.index("    fallback: [\n")
          fb_end = js.index('    "proxy-server-nameserver": [\n', fb_start)
          js = js[:fb_start] + js[fb_end:]
          if "  tun: {" in js or '"fake-ip-range6"' in js or "    fallback: [" in js or '"fallback-filter"' in js:
              raise SystemExit("JS iOS cleanup incomplete")
          if "    ipv6: false,\n" not in js:
              raise SystemExit("JS ipv6 was not disabled")
          out_js.write_text(js, encoding="utf-8")
          PY

      - name: Check generated configs
        run: |
          ruby -e 'require "yaml"; YAML.safe_load_file("防DNS泄露-iOS.yaml", aliases: true)'
          node --check "防DNS泄露-iOS.js"

      - name: Commit iOS configs
        run: |
          set -euo pipefail
          if [ -z "$(git status --short -- "防DNS泄露-iOS.yaml" "防DNS泄露-iOS.js")" ]; then
            echo "No iOS config changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "防DNS泄露-iOS.yaml" "防DNS泄露-iOS.js"
          git commit -m "config: add iOS Clash Mi config"
          git push
