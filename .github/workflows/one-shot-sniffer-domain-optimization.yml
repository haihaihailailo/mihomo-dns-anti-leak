name: One-shot sniffer domain optimization

on:
  push:
    paths:
      - ".github/workflows/one-shot-sniffer-domain-optimization.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    name: Add sniffer skip-domain safeguards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update YAML and JS sniffer settings
        run: |
          python3 <<'PY'
          from pathlib import Path

          yaml_path = Path("防DNS泄露.yaml")
          js_path = Path("防DNS泄露.js")

          yaml = yaml_path.read_text(encoding="utf-8")
          if "  skip-domain:\n" not in yaml:
              yaml = yaml.replace(
                  "  parse-pure-ip: true\n  # 跳过局域网目标嗅探",
                  "  parse-pure-ip: true\n  # 这些域名本身依赖真实 DNS / 局域网 / 推送 / 时间服务，跳过嗅探避免目标被误改写。\n  skip-domain:\n    - \"+.lan\"\n    - \"+.local\"\n    - \"+.home.arpa\"\n    - \"+.localdomain\"\n    - \"router.asus.com\"\n    - \"tplogin.cn\"\n    - \"miwifi.com\"\n    - \"tendawifi.com\"\n    - \"time.*.com\"\n    - \"time.*.gov\"\n    - \"time.windows.com\"\n    - \"pool.ntp.org\"\n    - \"+.ntp.org\"\n    - \"+.push.apple.com\"\n    - \"courier.push.apple.com\"\n    - \"localhost.ptlogin2.qq.com\"\n    - \"localhost.sec.qq.com\"\n    - \"localhost.work.weixin.qq.com\"\n  # 跳过局域网目标嗅探",
                  1,
              )
          yaml_path.write_text(yaml, encoding="utf-8")

          js = js_path.read_text(encoding="utf-8")
          if '    "skip-domain": [\n' not in js:
              js = js.replace(
                  '    "parse-pure-ip": true,\n    "skip-dst-address": [\n',
                  '    "parse-pure-ip": true,\n    // 这些域名依赖真实 DNS / 局域网 / 推送 / 时间服务，跳过嗅探避免目标被误改写。\n    "skip-domain": [\n      "+.lan",\n      "+.local",\n      "+.home.arpa",\n      "+.localdomain",\n      "router.asus.com",\n      "tplogin.cn",\n      "miwifi.com",\n      "tendawifi.com",\n      "time.*.com",\n      "time.*.gov",\n      "time.windows.com",\n      "pool.ntp.org",\n      "+.ntp.org",\n      "+.push.apple.com",\n      "courier.push.apple.com",\n      "localhost.ptlogin2.qq.com",\n      "localhost.sec.qq.com",\n      "localhost.work.weixin.qq.com",\n    ],\n    "skip-dst-address": [\n',
                  1,
              )
          js_path.write_text(js, encoding="utf-8")
          PY

      - name: Commit sniffer optimization
        run: |
          set -euo pipefail
          if git diff --quiet -- "防DNS泄露.yaml" "防DNS泄露.js"; then
            echo "No sniffer optimization changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "防DNS泄露.yaml" "防DNS泄露.js"
          git commit -m "config: 增加 sniffer 域名跳过保护"
          git push
