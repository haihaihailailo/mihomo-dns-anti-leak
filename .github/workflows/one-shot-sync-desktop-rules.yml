name: One-shot sync desktop process rules

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Sync desktop rules into main config
        shell: python
        run: |
          from pathlib import Path

          main_path = Path('防DNS泄露.yaml')
          desktop_path = Path('desktop-process-name-rules.yaml')

          main = main_path.read_text(encoding='utf-8')
          desktop = desktop_path.read_text(encoding='utf-8')

          marker = '  - "PROCESS-NAME,aria2c,DIRECT"\n'
          desktop_marker = '  # --- 桌面端 AI / 开发工具 ---\n'

          if marker not in main:
              raise SystemExit('BT keep marker not found')
          if 'rules:\n' not in desktop:
              raise SystemExit('desktop rules marker not found')

          desktop_block = desktop.split('rules:\n', 1)[1]
          desktop_block = desktop_block.replace('  # 下方不要放 MATCH,DIRECT；把这些规则插入主配置 rules: 前部即可。\n', '')
          desktop_block = desktop_block.rstrip() + '\n  \n'

          if desktop_marker in main:
              print('Desktop rules already exist. No changes needed.')
          else:
              main = main.replace(marker, desktop_block + marker, 1)
              main_path.write_text(main, encoding='utf-8')
              print('Synced desktop process rules into 防DNS泄露.yaml')

      - name: Commit sync
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 防DNS泄露.yaml
          git commit -m "feat: add desktop process routing rules to main config"
          git push
