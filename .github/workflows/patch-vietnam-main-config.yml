              ('com.oplus.aicall', 'OPLUS AI通话'),
              ('com.oplus.aimemory', 'OPLUS 小布记忆'),
              ('com.oplus.owork', 'OPLUS OWork'),
              ('com.newcall', '国内新通话'),
              ('com.ted.number', '智能识别陌生号码'),
              ('com.opos.ads', '国内智能推荐服务'),
              ('com.xiaomi.xmsf', '小米服务框架'),
