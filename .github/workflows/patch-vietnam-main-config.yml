com.xiaomi.scanner
com.miui.cleanmaster
com.xiaomi.ugd
com.android.updater
com.lbe.security.miui
'''.strip().splitlines()

          packages = [p.replace(' ', '') for p in packages if p.strip()]
          new_rules = []
          for pkg in packages:
              if f'PROCESS-NAME,{pkg},' not in text:
                  new_rules.append(f'  - PROCESS-NAME,{pkg},国内服务 # 国内厂商网络组件')

          if new_rules:
              if marker not in text:
                  raise SystemExit('marker not found: unionpay tsmservice marker')
              text = text.replace(marker, marker + ''.join(r + '\n' for r in new_rules), 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.BOT_PAT }}@github.com/${{ github.repository }}.git"
          git add 防DNS泄露.yaml
          git commit -m "add domestic vendor network component rules" || exit 0
          git push
