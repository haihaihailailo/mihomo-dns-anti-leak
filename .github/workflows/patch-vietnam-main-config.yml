              ('com.miui.notes', 'MIUI 笔记'),
              ('com.miui.securitycenter', 'MIUI 安全中心'),
              ('com.miui.securitymanager', 'MIUI 安全管理'),
              ('com.miui.packageinstaller', 'MIUI 包管理'),
              ('com.miui.hybrid', 'MIUI 快应用框架'),
              ('com.xiaomi.gamecenter.sdk.service', '小米游戏服务'),
              ('com.xiaomi.migameservice', '小米游戏AI服务'),
              ('com.xiaomi.minigame', '小米小游戏服务'),
              ('com.miui.yellowpage', 'MIUI 生活黄页'),
              ('com.miui.bugreport', 'MIUI 用户反馈'),
              ('com.miui.personalassistant', 'MIUI 智能助理'),
              ('com.xiaomi.mibrain.speech', '小米语音引擎'),
              ('com.miui.voiceassist', '小爱同学'),
              ('com.miui.voiceassistProxy', '小爱代理'),
              ('com.xiaomi.scanner', '小米扫描'),
              ('com.miui.cleanmaster', 'MIUI 垃圾清理'),
              ('com.xiaomi.ugd', '小米 GPU驱动更新'),
              ('com.android.updater', '系统更新'),
              ('com.lbe.security.miui', 'MIUI 权限管理服务'),
              ('com.miuix.editor', 'MIUI 编辑组件'),
              ('com.mobiletools.systemhelper', 'SystemHelper'),
          ]
          domestic_rules = [f'  - PROCESS-NAME,{pkg},国内服务 # {name}' for pkg, name in domestic_pkgs]
          insert_after('  - PROCESS-NAME,com.unionpay.tsmservice,国内服务 # 银联可信服务安全组件\n', domestic_rules)

          microsoft_pkgs = [
              ('com.microsoft.appmanager', '连接至 Windows'),
              ('com.microsoft.deviceintegrationservice', 'Microsoft Device Integration Service'),
              ('com.microsoftsdk.crossdeviceservicebroker', 'Microsoft Cross Device Service Broker'),
          ]
          microsoft_rules = [f'  - PROCESS-NAME,{pkg},微软服务 # {name}' for pkg, name in microsoft_pkgs]
          insert_after('  - PROCESS-NAME,com.google.earth,谷歌服务 # Google Earth\n', microsoft_rules)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.BOT_PAT }}@github.com/${{ github.repository }}.git"
          git add 防DNS泄露.yaml
          git commit -m "add remaining installed package rules" || exit 0
          git push
