          if 'DOMAIN-SUFFIX,tuoitre.vn,越南服务' not in text:
              if marker not in text:
                  raise SystemExit('marker not found')
              text = text.replace(marker, marker + block, 1)

          workflow = Path('.github/workflows/patch-vietnam-main-config.yml')
          path.write_text(text, encoding='utf-8')
          workflow.unlink(missing_ok=True)
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 防DNS泄露.yaml
          git add -u .github/workflows/patch-vietnam-main-config.yml
          git commit -m "add Vietnam domains to main config" || exit 0
          git push
