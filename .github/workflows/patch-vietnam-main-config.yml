name: Patch more domestic package rules

on:
  push:
    paths:
      - ".github/workflows/patch-vietnam-main-config.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Patch main config
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')
          marker = '  - PROCESS-NAME,com.oplus.member,国内服务 # 我的OPPO\n'
          rules = [
              '  - PROCESS-NAME,com.cnspeedtest.globalspeed,国内服务 # 全球网测',
              '  - PROCESS-NAME,com.chinamworld.bocmbci,国内服务 # 中国银行',
              '  - PROCESS-NAME,com.bankcomm.Bankcomm,国内服务 # 交通银行',
              '  - PROCESS-NAME,cn.com.spdb.mobilebank.per,国内服务 # 浦发银行',
              '  - PROCESS-NAME,cmb.pb,国内服务 # 招商银行',
              '  - PROCESS-NAME,com.kingpoint.gmcchh,国内服务 # 中国移动广东',
              '  - PROCESS-NAME,cn.gov.pbc.dcep,国内服务 # 数字人民币',
              '  - PROCESS-NAME,cn.gov.tax.its,国内服务 # 个人所得税',
              '  - PROCESS-NAME,com.cdb.sla,国内服务 # 国家助学贷款',
              '  - PROCESS-NAME,cn.cyberIdentity.certification,国内服务 # 国家网络身份认证',
              '  - PROCESS-NAME,com.sohu.inputmethod.sogouoem,国内服务 # 搜狗输入法定制版',
              '  - PROCESS-NAME,com.android.browser,国内服务 # 国内系统浏览器',
              '  - PROCESS-NAME,com.finshell.wallet,国内服务 # 钱包',
              '  - PROCESS-NAME,com.unionpay.tsmservice,国内服务 # 银联可信服务安全组件',
          ]
          block = ''.join(rule + '\n' for rule in rules)

          if 'PROCESS-NAME,com.cnspeedtest.globalspeed,国内服务' not in text:
              if marker not in text:
                  raise SystemExit('marker not found: OPPO member marker')
              text = text.replace(marker, marker + block, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.BOT_PAT }}@github.com/${{ github.repository }}.git"
          git add 防DNS泄露.yaml
          git commit -m "add more domestic package rules" || exit 0
          git push
