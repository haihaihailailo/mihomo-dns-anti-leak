name: Patch LAN direct priority

on:
  push:
    paths:
      - ".github/workflows/patch-vietnam-main-config.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Patch main config
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')

          marker = 'rules:\n'
          lan_block = '''  # --- 局域网 / 私有地址：最高优先级直连，避免被 PROCESS-NAME 抢先命中 ---
  - "RULE-SET,private,DIRECT"
  - "GEOIP,LAN,DIRECT,no-resolve"
  - "IP-CIDR,0.0.0.0/8,DIRECT,no-resolve"
  - "IP-CIDR,10.0.0.0/8,DIRECT,no-resolve"
  - "IP-CIDR,100.64.0.0/10,DIRECT,no-resolve"
  - "IP-CIDR,127.0.0.0/8,DIRECT,no-resolve"
  - "IP-CIDR,169.254.0.0/16,DIRECT,no-resolve"
  - "IP-CIDR,172.16.0.0/12,DIRECT,no-resolve"
  - "IP-CIDR,192.168.0.0/16,DIRECT,no-resolve"
  - "IP-CIDR,224.0.0.0/4,DIRECT,no-resolve"
  - "IP-CIDR,255.255.255.255/32,DIRECT,no-resolve"
  - "IP-CIDR6,::1/128,DIRECT,no-resolve"
  - "IP-CIDR6,fc00::/7,DIRECT,no-resolve"
  - "IP-CIDR6,fe80::/10,DIRECT,no-resolve"
  - "DOMAIN-SUFFIX,local,DIRECT"
  - "DOMAIN-SUFFIX,lan,DIRECT"

'''

          if '局域网 / 私有地址：最高优先级直连' not in text:
              if marker not in text:
                  raise SystemExit('rules marker not found')
              text = text.replace(marker, marker + lan_block, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.BOT_PAT }}@github.com/${{ github.repository }}.git"
          git add 防DNS泄露.yaml
          git commit -m "prioritize LAN direct rules" || exit 0
          git push
