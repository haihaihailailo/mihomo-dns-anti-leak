name: Patch remaining installed package rules

on:
  push:
    paths:
      - ".github/workflows/patch-vietnam-main-config.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Patch main config
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')

          def insert_after(marker, rules):
              global text
              block = ''.join(r + '\n' for r in rules if r.split(',')[1] not in text)
              if not block:
                  return
              if marker not in text:
                  raise SystemExit('marker not found: ' + marker)
              text = text.replace(marker, marker + block, 1)

          domestic_pkgs = [
              ('com.heytap.cloud', 'HeyTap 云服务'),
              ('com.heytap.mcs', 'HeyTap 系统消息/推送'),
              ('com.heytap.openid', 'HeyTap OpenID'),
              ('com.heytap.vip', 'HeyTap 账号服务'),
              ('com.heytap.htms', 'HeyTap 移动服务'),
              ('com.heytap.tas', 'HeyTap 系统卡包'),
              ('com.heytap.accessory', 'HeyTap 设备快连'),
              ('com.heytap.mydevices', 'HeyTap 设备空间'),
              ('com.heytap.opluscarlink', 'OPPO CarLink'),
              ('andes.oplus.documentsreader', 'OPPO 文档'),
              ('com.coloros.findmyphone', 'ColorOS 查找手机'),
              ('com.coloros.oshare', 'OPPO互传'),
              ('com.coloros.phonemanager', 'ColorOS 手机管家'),
              ('com.coloros.filemanager', 'ColorOS 文件管理'),
              ('com.coloros.gallery3d', 'ColorOS 相册'),
              ('com.coloros.weather2', 'ColorOS 天气'),
              ('com.coloros.weather.service', 'ColorOS 天气服务'),
              ('com.coloros.note', 'ColorOS 便签'),
              ('com.coloros.calendar', 'ColorOS 日历'),
              ('com.coloros.video', 'ColorOS 视频'),
              ('com.coloros.backuprestore', 'ColorOS 备份恢复'),
              ('com.coloros.remoteguardservice', 'ColorOS 远程守护'),
              ('com.coloros.operationManual', 'ColorOS 帮助与反馈'),
              ('com.coloros.assistantscreen', 'ColorOS 速览'),
              ('com.coloros.translate', 'ColorOS 翻译'),
              ('com.oplus.account', 'OPLUS 账号中心'),
              ('com.oplus.vip', 'OPLUS 账号服务'),
              ('com.oplus.ota', 'OPLUS 软件更新'),
              ('com.oplus.romupdate', 'OPLUS ROM更新'),
              ('com.oplus.sau', 'OPLUS 系统升级服务'),
              ('com.oplus.cota', 'OPLUS 配置更新'),
              ('com.oplus.apprecover', 'OPLUS 应用找回'),
              ('com.oplus.pay', 'OPLUS 钱包/支付'),
              ('com.oplus.safecenter', 'OPLUS 安全中心'),
              ('com.oplus.games', 'OPLUS 游戏助手'),
              ('com.oplus.ocar', 'OPLUS Car+'),
              ('com.oplus.linker', 'OPLUS 设备互联'),
              ('com.oplus.cast', 'OPLUS 投屏'),
              ('com.oplus.remotecontrol', 'OPLUS 远程控制'),
              ('com.oplus.dfs', 'OPLUS 跨设备文件'),
              ('com.oplus.melody', 'OPLUS 耳机服务'),
