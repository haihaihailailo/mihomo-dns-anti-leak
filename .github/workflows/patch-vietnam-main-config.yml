name: Patch Coolapk domains into main config

on:
  push:
    paths:
      - ".github/workflows/patch-vietnam-main-config.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Patch main config
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')
          marker = '  - "DOMAIN-SUFFIX,yhglobal.com,国内服务"\n'
          rules = [
              '  - "DOMAIN-SUFFIX,coolapk.com,国内服务"',
              '  - "DOMAIN-SUFFIX,www.coolapk.com,国内服务"',
              '  - "DOMAIN-SUFFIX,m.coolapk.com,国内服务"',
              '  - "DOMAIN-KEYWORD,coolapk,国内服务"',
          ]
          block = ''.join(r + '\n' for r in rules)

          if 'DOMAIN-SUFFIX,coolapk.com,国内服务' not in text:
              if marker not in text:
                  raise SystemExit('marker not found')
              text = text.replace(marker, marker + block, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.BOT_PAT }}@github.com/${{ github.repository }}.git"
          git add 防DNS泄露.yaml
          git commit -m "add Coolapk domains to domestic services" || exit 0
          git push
