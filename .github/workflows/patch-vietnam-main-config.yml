name: Patch domestic vendor network components

on:
  push:
    paths:
      - ".github/workflows/patch-vietnam-main-config.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Patch main config
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')
          marker = '  - PROCESS-NAME,com.unionpay.tsmservice,国内服务 # 银联可信服务安全组件\n'
          packages = '''
com.heytap.cloud
com.heytap.mcs
com.heytap.openid
