name: Patch OPPO browser domestic rule

on:
  push:
    paths:
      - ".github/workflows/patch-vietnam-main-config.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Patch main config
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('防DNS泄露.yaml')
          text = path.read_text(encoding='utf-8')
          old = '  # - PROCESS-NAME,com.heytap.browser,国内服务 # 浏览器（浏览器不按包名固定，交给域名规则分流）'
          new = '  - PROCESS-NAME,com.heytap.browser,国内服务 # OPPO 浏览器'

          if old in text:
              text = text.replace(old, new, 1)
          elif 'PROCESS-NAME,com.heytap.browser,国内服务' not in text:
              marker = '  - PROCESS-NAME,com.heytap.market,国内服务 # 软件商店\n'
              if marker not in text:
                  raise SystemExit('marker not found: heytap market marker')
              text = text.replace(marker, marker + new + '\n', 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.BOT_PAT }}@github.com/${{ github.repository }}.git"
          git add 防DNS泄露.yaml
          git commit -m "set OPPO browser to domestic services" || exit 0
          git push
