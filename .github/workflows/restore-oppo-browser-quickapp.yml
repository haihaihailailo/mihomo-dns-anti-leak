name: Restore OPPO browser and quick app domestic routing

on:
  push:
    paths:
      - .github/workflows/restore-oppo-browser-quickapp.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-routing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore domestic service PROCESS-NAME rules
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "  # - PROCESS-NAME,com.heytap.browser,国内服务 # OPPO 浏览器（混合入口，交给域名规则分流）\n":
              "  - PROCESS-NAME,com.heytap.browser,国内服务 # OPPO 浏览器\n",
              "  # - PROCESS-NAME,com.nearme.instant.platform,国内服务 # 快应用服务框架（混合入口，交给域名规则分流）\n":
              "  - PROCESS-NAME,com.nearme.instant.platform,国内服务 # 快应用服务框架\n",
          }

          for filename in ("防DNS泄露.yaml", "android-process-name-rules.yaml"):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in replacements.items():
                  if old not in text and new not in text:
                      raise RuntimeError(f"Expected rule not found in {filename}: {old.strip()}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Commit changes and remove one-time workflow
        run: |
          git rm .github/workflows/restore-oppo-browser-quickapp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 防DNS泄露.yaml android-process-name-rules.yaml
          git commit -m "fix: route OPPO browser and quick app through domestic service"
          git push
