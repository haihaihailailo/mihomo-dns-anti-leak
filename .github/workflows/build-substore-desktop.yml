name: Build Sub-Store Desktop

on:
  push:
    paths:
      - "tools/sub-store-desktop/**"
      - ".github/workflows/build-substore-desktop.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-desktop:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows desktop app
        shell: pwsh
        run: |
          dotnet publish tools/sub-store-desktop/SubStoreDesktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o dist

      - name: Rename artifact file
        shell: pwsh
        run: |
          if (Test-Path dist/SubStoreDesktop.exe) {
            Rename-Item dist/SubStoreDesktop.exe SubStoreDesktop-win-x64.exe -Force
          }

      - name: Upload desktop app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubStoreDesktop-win-x64
          path: dist/SubStoreDesktop-win-x64.exe
          if-no-files-found: error
