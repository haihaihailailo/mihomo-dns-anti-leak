unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

geo-auto-update: true
geo-update-interval: 24

tcp-concurrent: true
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

tun:
  stack: mixed
  auto-route: true
  auto-detect-interface: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  prefer-h3: false
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query#RULES
    - https://8.8.8.8/dns-query#RULES
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  proxy-server-nameserver: [https://223.5.5.5/dns-query]
  direct-nameserver: [https://223.5.5.5/dns-query]
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "geosite:private,cn": [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
    "geosite:gfw,geolocation-!cn": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.google.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.google.com.vn": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.google.com.hk": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.google.co.jp": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.googleapis.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.googleapis.cn": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.gstatic.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.googleusercontent.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.gvt1.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.gvt2.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.gvt3.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.ggpht.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.recaptcha.net": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.pki.goog": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.openai.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.chatgpt.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.oaistatic.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]
    "+.oaiusercontent.com": [https://1.1.1.1/dns-query#RULES, https://8.8.8.8/dns-query#RULES]

