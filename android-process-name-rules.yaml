  - PROCESS-NAME,com.openai.chatgpt,AI # ChatGPT
  - PROCESS-NAME,com.google.android.apps.bard,AI # Gemini
  - PROCESS-NAME,com.anthropic.claude,AI # Claude
  - PROCESS-NAME,ai.perplexity.app.android,AI # Perplexity
  - PROCESS-NAME,com.microsoft.copilot,AI # Microsoft Copilot

