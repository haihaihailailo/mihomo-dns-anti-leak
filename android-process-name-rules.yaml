# Android 包名分流规则片段
# 用途：两个手机 + 平板共用同一套 mihomo / Clash Meta 配置时，按 Android 包名统一分流。
#
# 使用方法：
# 1. 在 Clash Mi / mihomo 客户端界面打开“进程匹配 / 包名匹配”相关开关。
# 2. 只复制下方 PROCESS-NAME 规则到主配置 rules: 的最前面。
# 3. 保留原配置后面的 GEOSITE / GEOIP / RULE-SET / MATCH 规则。
#
# 注意：PROCESS-NAME 在 Android 平台匹配的是应用包名。
# 不要把 Clash Mi 自己、银行支付、微信/QQ、国内购物、系统组件加入代理规则。

rules:
